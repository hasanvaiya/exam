        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 3D গ্লোবাল ইফেক্ট */
        .glow-text {
            text-shadow: 0 0 20px rgba(0,255,255,0.3), 0 0 40px rgba(0,100,255,0.2);
        }

        /* অ্যানিমেটেড ব্যাকগ্রাউন্ড */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(0,150,255,0.08) 0%, rgba(0,0,0,0) 60%);
            animation: rotateBg 40s linear infinite;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* হেডার 3D */
        .header {
            background: rgba(5, 15, 25, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* 3D লোগো */
        .logo-3d {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(0,100,255,0.3);
            transform: rotate(5deg);
            transition: transform 0.3s;
        }

        .logo-icon:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .logo-text h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 11px;
            opacity: 0.7;
        }

        .notify-btn {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,100,255,0.3);
        }

        .notify-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,100,255,0.4);
        }

        /* তথ্য বার */
        .info-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 14px 20px;
            margin: 25px 0;
            border: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        /* সার্চ ও ফিল্টার */
        .search-area {
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .batch-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 18px;
            max-height: 140px;
            overflow-y: auto;
        }

        .batch-3d {
            background: linear-gradient(135deg, rgba(0,100,255,0.2), rgba(0,50,150,0.3));
            border: 1px solid rgba(0, 200, 255, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .batch-3d:hover, .batch-3d.active {
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,100,255,0.4);
        }

        /* রুটিন কার্ড 3D */
        .date-card {
            background: rgba(10, 20, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            margin-bottom: 28px;
            overflow: hidden;
            border: 1px solid rgba(0, 200, 255, 0.2);
            transition: all 0.3s;
            transform-style: preserve-3d;
        }

        .date-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 20px rgba(0,212,255,0.1);
        }

        .date-header {
            background: rgba(0, 50, 80, 0.5);
            padding: 18px 24px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .date-title {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reminder-3d {
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.4);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reminder-3d:hover {
            background: rgba(0, 212, 255, 0.3);
        }

        /* টেবিল */
        .exam-table {
            width: 100%;
        }

        .exam-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            flex-wrap: wrap;
            gap: 12px;
        }

        .exam-row:hover {
            background: rgba(0, 100, 255, 0.1);
        }

        .exam-info {
            flex: 2;
        }

        .course-code {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.3px;
        }

        .batch-badge {
            background: rgba(0, 212, 255, 0.2);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            margin-top: 6px;
        }

        .time-text, .teacher-text {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .countdown-3d {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 18px;
            border-radius: 50px;
            font-family: monospace;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            min-width: 140px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .countdown-urgent {
            background: linear-gradient(135deg, #ff3366, #ff0066);
            animation: pulse-glow 1s infinite;
            border: none;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(255,51,102,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255,51,102,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,51,102,0); }

            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 35px;
            margin-bottom: 30px;
        }

            background: linear-gradient(135deg, #1a2a4a, #0f1a2f);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .download-3d:hover {
            transform: translateY(-3px);
            border-color: #00d4ff;
            box-shadow: 0 10px 20px rgba(0,212,255,0.2);

            text-align: center;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

            padding: 60px;
            background: rgba(10,20,35,0.5);
            border-radius: 28px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0f1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .exam-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .countdown-3d {
                align-self: flex-start;
            }
            .container {
                padding: 0 16px;
            }
        }

        @media print {
            body {
                background: white;
                color: black;
            }
            .animated-bg, .stars, .notify-btn, .download-section, .reminder-3d, .batch-grid, .search-area, .info-card {
                display: none;
            }
            .date-card {
                background: white;
                border: 1px solid #ccc;
                color: black;
            }
        }

        { date: "2026-05-06", dateBangla: "০৬ মে ২০২৬ (বুধবার)", time: "১১:৪৫ AM - ০১:৪৫ PM", course: "CSE0613405", batch: "59A", teacher: "RHB", room: "" }
    ];

    // ইউনিক ব্যাচ লিস্ট
    function getAllBatches() {
        const batches = [...new Set(examRoutine.map(item => item.batch))];
        return batches.sort();
    }

    // কাউন্টডাউন (দিন, ঘণ্টা, মিনিট, সেকেন্ড)
    function getCountdown(examDateStr, timeStr) {
        const now = new Date();
        let hour = 11, minute = 45;
        if(timeStr.includes("০৯:০০ AM")) { hour = 9; minute = 0; }
        else if(timeStr.includes("১১:৪৫ AM")) { hour = 11; minute = 45; }
        
        const examDateTime = new Date(examDateStr);
        examDateTime.setHours(hour, minute, 0, 0);
        
        const diff = examDateTime - now;
        
        if(diff <= 0) return '<span class="countdown-3d">✅ শুরু/শেষ</span>';
        
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        const seconds = Math.floor((diff % 60000) / 1000);
        
        if(days > 0) return `<span class="countdown-3d">⏰ ${days}d ${hours}h ${minutes}m ${seconds}s</span>`;
        if(hours > 0) return `<span class="countdown-3d countdown-urgent">⚠️ ${hours}h ${minutes}m ${seconds}s</span>`;
        return `<span class="countdown-3d countdown-urgent">🔥 ${minutes}m ${seconds}s</span>`;
    }

    // রুটিন রেন্ডার
    function renderRoutine(searchTerm = "") {
        let filtered = examRoutine;
        if(searchTerm && searchTerm.trim() !== "") {
            const term = searchTerm.trim().toUpperCase();
            filtered = examRoutine.filter(item => item.batch.toUpperCase().includes(term));
        }
        
        if(filtered.length === 0) {
            document.getElementById("routineContainer").innerHTML = `<div class="no-result">🔖 "${searchTerm}" ব্যাচের কোনো পরীক্ষা পাওয়া যায়নি</div>`;
            return;
        }
        
        const grouped = {};
        filtered.forEach(item => {
            if(!grouped[item.date]) grouped[item.date] = { dateBangla: item.dateBangla, exams: [] };
            grouped[item.date].exams.push(item);
        });
        
        const sortedDates = Object.keys(grouped).sort();
        let html = "";
        
        for(const dateKey of sortedDates) {
            const group = grouped[dateKey];
            html += `
                <div class="date-card">
                    <div class="date-header">
                        <div class="date-title"><i class="fas fa-calendar-alt"></i> ${group.dateBangla}</div>
                        <button class="reminder-3d" data-date="${dateKey}"><i class="fas fa-bell"></i> রিমাইন্ডার</button>
                    </div>
            `;
            
            for(const exam of group.exams) {
                const countdown = getCountdown(exam.date, exam.time);
                html += `
                    <div class="exam-row">
                        <div class="exam-info">
                            <div class="course-code">📖 ${exam.course}</div>
                            <div class="batch-badge">🎓 ${exam.batch}</div>
                            <div class="time-text"><i class="far fa-clock"></i> ${exam.time}</div>
                            <div class="teacher-text"><i class="fas fa-chalkboard-user"></i> ${exam.teacher}</div>
                        </div>
                        <div>${countdown}</div>
                    </div>
                `;
            }
            html += `</div>`;
        }
        
        document.getElementById("routineContainer").innerHTML = html;
        
        document.querySelectorAll('.reminder-3d').forEach(btn => {
            btn.addEventListener('click', function() {
                const examDate = this.getAttribute('data-date');
                const examDateObj = new Date(examDate);
                const today = new Date();
                const diffDays = Math.ceil((examDateObj - today) / (1000*60*60*24));
                
                if(Notification.permission === 'granted') {
                    if(diffDays === 1) {
                        new Notification('📢 উত্তরা ইউনিভার্সিটি', { body: 'আগামীকাল পরীক্ষা! রুটিন চেক করুন।' });
                        alert('✅ আগামীকালের নোটিফিকেশন সেট হয়েছে!');
                    } else if(diffDays > 1) {
                        alert(`🔔 রিমাইন্ডার সেট করা হয়েছে। পরীক্ষার ১ দিন আগে নোটিফিকেশন পাবেন।`);
                    } else {
                        alert('⚠️ এই পরীক্ষার তারিখ পেরিয়ে গেছে।');
                    }
                } else {
                    alert('দয়া করে উপরের "নোটিফিকেশন চালু" বাটনে ক্লিক করুন।');
                }
            });
        });
    }

    // ব্যাচ বাটন
    function createBatchButtons() {
        const batches = getAllBatches();
        const container = document.getElementById("batchGrid");
        container.innerHTML = '<div class="batch-3d active" data-batch="">✨ সব ব্যাচ</div>';
        batches.forEach(batch => {
            const chip = document.createElement('div');
            chip.className = 'batch-3d';
            chip.textContent = batch;
            chip.onclick = () => {
                document.querySelectorAll('.batch-3d').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                document.getElementById('searchInput').value = batch;
                renderRoutine(batch);
            };
            container.appendChild(chip);
        });
    }

    // PDF ডাউনলোড
    function downloadPDF() {
        const searchTerm = document.getElementById('searchInput').value;
        let data = examRoutine;
        if(searchTerm.trim() !== "") {
            data = examRoutine.filter(item => item.batch.toUpperCase().includes(searchTerm.trim().toUpperCase()));
        }
        
        const grouped = {};
        data.forEach(item => {
            if(!grouped[item.date]) grouped[item.date] = { dateBangla: item.dateBangla, exams: [] };
            grouped[item.date].exams.push(item);
        });
        
        let printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <!DOCTYPE html>
            <html>
            <head><title>Uttara University Exam Routine</title><meta charset="UTF-8">
            <style>
                body { font-family: 'Segoe UI', sans-serif; padding: 30px; }
                h1 { color: #1b4f72; text-align: center; }
                .date-card { margin-bottom: 25px; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; }
                .date-header { background: #f0f4f8; padding: 12px; font-weight: bold; }
                .exam-row { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; flex-wrap: wrap; }
                .footer { text-align: center; margin-top: 30px; font-size: 11px; }
            </style>
            </head>
            <body>
            <h1>🏛️ উত্তরা ইউনিভার্সিটি</h1>
            <p style="text-align:center">ফাইনাল টার্ম পরীক্ষা বসন্ত ২০২৬ ${searchTerm ? `| ব্যাচ: ${searchTerm}` : ''}</p>
        `);
        
        const sortedDates = Object.keys(grouped).sort();
        for(const dateKey of sortedDates) {
            const group = grouped[dateKey];
            printWindow.document.write(`<div class="date-card"><div class="date-header">📅 ${group.dateBangla}</div>`);
            for(const exam of group.exams) {
                printWindow.document.write(`
                    <div class="exam-row">
                        <div><strong>${exam.course}</strong> | ${exam.batch} | ${exam.time}</div>
                        <div>👨‍🏫 ${exam.teacher}</div>
                    </div>
                `);
            }
            printWindow.document.write(`</div>`);
        }
        printWindow.document.write(`<div class="footer">© উত্তরা ইউনিভার্সিটি | Developed by: হাসান আহমেদ সজিব</div></body></html>`);
        printWindow.document.close();
        printWindow.print();
    }

    function downloadCSV() {
        const searchTerm = document.getElementById('searchInput').value;
        let data = examRoutine;
        if(searchTerm.trim() !== "") {
            data = examRoutine.filter(item => item.batch.toUpperCase().includes(searchTerm.trim().toUpperCase()));
        }
        let csv = "তারিখ,কোর্স কোড,ব্যাচ,সময়,কোর্স টিচার\n";
        data.forEach(item => {
            csv += `"${item.dateBangla}","${item.course}","${item.batch}","${item.time}","${item.teacher}"\n`;
        });
        const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `uttara_routine_${searchTerm || "all"}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    // স্টার জেনারেট
    function generateStars() {
        const starsContainer = document.getElementById('stars');
        for(let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 5 + 's';
            starsContainer.appendChild(star);
        }
    }

    // নোটিফিকেশন
    document.getElementById('notifyBtn').addEventListener('click', () => {
        if(Notification.permission === 'default') {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') alert('✅ নোটিফিকেশন চালু! পরীক্ষার ১ দিন আগে রিমাইন্ডার পাবেন।');
            });
        } else if(Notification.permission === 'granted') {
            alert('নোটিফিকেশন ইতিমধ্যে চালু আছে।');
        } else {
            alert('ব্রাউজার সেটিংস থেকে নোটিফিকেশন অন করুন।');
        }
    });

    document.getElementById('searchInput').addEventListener('keyup', (e) => renderRoutine(e.target.value));
    document.getElementById('pdfBtn').addEventListener('click', downloadPDF);
    document.getElementById('csvBtn').addEventListener('click', downloadCSV);
    document.getElementById('printBtn').addEventListener('click', () => window.print());

    // ইভরি সেকেন্ড কাউন্টডাউন আপডেট
    setInterval(() => {
        const currentSearch = document.getElementById('searchInput').value;
        renderRoutine(currentSearch);
    }, 1000);

    createBatchButtons();
    renderRoutine("");
    generateStars();
</script>
</body>
